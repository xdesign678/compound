<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4734a"/>
      <stop offset="100%" stop-color="#b85535"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Connector lines -->
  <line x1="256" y1="228" x2="144" y2="360" stroke="white" stroke-width="18" stroke-linecap="round" stroke-opacity="0.72"/>
  <line x1="256" y1="228" x2="368" y2="360" stroke="white" stroke-width="18" stroke-linecap="round" stroke-opacity="0.72"/>
  <line x1="256" y1="228" x2="256" y2="110" stroke="white" stroke-width="15" stroke-linecap="round" stroke-opacity="0.6"/>
  <line x1="144" y1="360" x2="368" y2="360" stroke="white" stroke-width="14" stroke-linecap="round" stroke-opacity="0.55"/>

  <!-- Satellite nodes -->
  <circle cx="144" cy="360" r="34" fill="white" fill-opacity="0.95"/>
  <circle cx="368" cy="360" r="34" fill="white" fill-opacity="0.95"/>
  <circle cx="256" cy="110" r="26" fill="white" fill-opacity="0.88"/>

  <!-- Central node -->
  <circle cx="256" cy="228" r="50" fill="white"/>
</svg>
