name: check

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Cache Next.js build output per the official recommendation:
      # https://nextjs.org/docs/pages/guides/ci-build-caching#github-actions
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - run: npm run validate:agents-md
      - run: npm run format:check
      - run: npm run lint -- --max-warnings=0
      - run: npm run typecheck
      - run: npm run test
      - run: npm run knip
      - run: npm run validate:profiling

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: SQLite backup and restore drill
        run: npm run backup:drill

      - name: Test coverage
        run: npm run test:coverage

      - name: Code quality metrics
        run: npm run quality:metrics

      - name: Duplicate code detection
        run: npm run quality:duplicates

      - name: Tech debt scan
        run: npm run debt:check

      - name: Check alerting rules
        run: npm run alerts:check

      - name: Publish code quality summary
        if: always()
        run: |
          if [ -f tmp/coverage/coverage-summary.md ]; then
            cat tmp/coverage/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f tmp/quality-metrics.md ]; then
            printf '\n' >> "$GITHUB_STEP_SUMMARY"
            cat tmp/quality-metrics.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f tmp/duplicate-report.md ]; then
            printf '\n' >> "$GITHUB_STEP_SUMMARY"
            cat tmp/duplicate-report.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f tmp/tech-debt-report.md ]; then
            printf '\n' >> "$GITHUB_STEP_SUMMARY"
            cat tmp/tech-debt-report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload code quality metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-quality-metrics
          path: |
            tmp/coverage/coverage-summary.json
            tmp/coverage/coverage-summary.md
            tmp/quality-metrics.json
            tmp/quality-metrics.md
            tmp/duplicate-report.json
            tmp/duplicate-report.md
            tmp/tech-debt-report.json
            tmp/tech-debt-report.md
          if-no-files-found: warn

      # Verify the auto-generated API reference (docs/api-reference.md) is
      # in sync with app/api/**/route.ts. If a route was added/removed/renamed
      # without regenerating the docs, this fails with a clear remediation.
      - name: Check generated API reference
        run: npm run docs:api:check

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Accessibility smoke tests
        run: npm run test:a11y

      - name: Functional browser tests
        run: npm run test:e2e

      - name: Fail-closed UX audit
        run: npm run audit:ux:all -- --surfaces=globalShell,sources,sourceDetail,settingsGeneral

      - name: Upload browser audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-quality-evidence
          path: |
            playwright-report
            tests/e2e/.results
            tmp/ux-audit
          if-no-files-found: warn

      - name: Build (with performance tracking)
        run: npm run build:measure

      - name: Upload build metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-metrics
          path: tmp/build-metrics.json
          if-no-files-found: warn

      - name: Build container
        run: docker build -t compound .

      - name: Start and health-check container
        run: |
          docker run -d --name compound-ci -p 3000:3000 \
            -e COMPOUND_ADMIN_TOKEN=e2e-token \
            -e DATA_DIR=/data \
            compound
          trap 'docker logs compound-ci; docker rm -f compound-ci >/dev/null 2>&1 || true' EXIT
          for attempt in $(seq 1 45); do
            if curl --fail --silent --show-error http://127.0.0.1:3000/api/health >/dev/null; then
              docker inspect --format='{{.State.Health.Status}}' compound-ci
              exit 0
            fi
            sleep 2
          done
          exit 1
