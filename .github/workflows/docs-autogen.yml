name: Auto-generate API docs

# Whenever an API route or the generator changes on `main`, regenerate
# `docs/api-reference.md` and commit the result back. This closes the
# loop on automated documentation: contributors only need to write a
# JSDoc comment above their handler — CI takes care of publishing it.

on:
  push:
    branches: [main]
    paths:
      - 'app/api/**'
      - 'scripts/generate-api-docs.mjs'
      - '.github/workflows/docs-autogen.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-autogen
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          # Use the default GITHUB_TOKEN; the commit will be attributed to
          # the github-actions[bot] user. No PAT needed.
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Regenerate API reference
        run: node scripts/generate-api-docs.mjs

      - name: Commit if changed
        run: |
          set -euo pipefail
          if git diff --quiet -- docs/api-reference.md; then
            echo "API reference already up to date."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/api-reference.md
          git commit -m "docs(api): regenerate api-reference.md [skip ci]"
          git push origin HEAD:main
