name: PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  danger:
    name: Danger JS automated review
    runs-on: ubuntu-latest
    # Skip for drafts to avoid noisy comments while work is in progress.
    if: ${{ github.event.pull_request.draft == false }}
    steps:
      - name: Check out PR
        uses: actions/checkout@v4
        with:
          # Danger needs the full history so it can diff against the base branch.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Danger
        run: npx danger ci --failOnErrors
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
