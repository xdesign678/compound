  <text x="956" y="340" fill="#4A433A" font-family="Inter, PingFang SC, sans-serif" font-size="19">最稳，也最容易落地。</text>
  <text x="956" y="374" fill="#4A433A" font-family="Inter, PingFang SC, sans-serif" font-size="19">图 2 那排按钮终于有了归属。</text>
