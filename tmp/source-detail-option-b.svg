  <text x="184" y="105" fill="#171614" font-family="Inter, PingFang SC, sans-serif" font-size="32" font-weight="700">双栏工作台型</text>
  <text x="84" y="144" fill="#6B645A" font-family="Inter, PingFang SC, sans-serif" font-size="20">把来源、概念、操作收进固定侧栏，正文区只做正文。</text>

  <rect x="84" y="190" width="820" height="560" rx="24" fill="#FAF7F0" stroke="#E6DBCF"/>
