  <text x="130" y="104" text-anchor="middle" fill="#2D5A39" font-family="Inter, PingFang SC, sans-serif" font-size="20" font-weight="700">A2</text>
  <text x="196" y="105" fill="#171614" font-family="Inter, PingFang SC, sans-serif" font-size="32" font-weight="700">顶部摘要卡片模块</text>
  <text x="84" y="146" fill="#6B645A" font-family="Inter, PingFang SC, sans-serif" font-size="20">更像成熟文章页。资料关系被收进一个完整的头部卡片。</text>

  <rect x="84" y="204" width="88" height="28" rx="14" fill="#F3E5D7"/>
  <text x="128" y="223" text-anchor="middle" fill="#C36B3E" font-family="Inter, PingFang SC, sans-serif" font-size="14" font-weight="700">资料档案</text>
  <text x="84" y="298" fill="#171614" font-family="Inter, PingFang SC, sans-serif" font-size="46" font-weight="700">之字形图像</text>
  <text x="84" y="338" fill="#7A7369" font-family="Inter, PingFang SC, sans-serif" font-size="18">昨天 · 4 个相关概念</text>

  <rect x="84" y="378" width="1232" height="166" rx="24" fill="#F6F0E5" stroke="#E2D5C7"/>
  <text x="118" y="420" fill="#847768" font-family="Inter, PingFang SC, sans-serif" font-size="16" font-weight="700">顶部资料卡</text>
  <text x="118" y="460" fill="#4F473D" font-family="Inter, PingFang SC, sans-serif" font-size="22" font-weight="700">这篇资料主要讨论：之字形图像中的文字布局如何影响阅读效率。</text>
  <text x="118" y="498" fill="#6C6257" font-family="Inter, PingFang SC, sans-serif" font-size="18">把来源、概念关系、引用跳转都放进这里，正文从下方自然开始，不再被工具按钮打断。</text>
  <rect x="118" y="516" width="240" height="34" rx="17" fill="#FFFDFC" stroke="#D8CCBD"/>
